<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Importar Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Importar Iconos de Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { padding: 15px; font-size: 14px; }
      .sheet-list { margin-top: 10px; max-height: 220px; overflow-y: auto; border: 1px solid #e0e0e0; padding: 10px; border-radius: 4px; background: #fafafa; position: relative; }
      .sheet-item { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
      .sheet-item:last-child { border-bottom: none; }
      .sheet-item label { color: #333; flex-grow: 1; display: flex; align-items: center; cursor: pointer; }
      .sheet-hidden { opacity: 0.5; font-style: italic; }
      .sheet-hidden i { font-size: 16px; margin-left: 5px; color: #9e9e9e; }
      .footer { margin-top: 20px; }
      .btn-small { width: 100%; margin-bottom: 8px; text-transform: none; display: flex; align-items: center; justify-content: center; }
      .section-title { font-weight: bold; margin-bottom: 5px; border-bottom: 2px solid #2196F3; display: flex; align-items: center; justify-content: space-between; width: 100%; padding-bottom: 2px; }
      .selection-controls { display: flex; justify-content: space-between; margin-bottom: 5px; }
      .selection-controls a { font-size: 11px; cursor: pointer; color: #2196F3; font-weight: 500; }
      .selection-controls a.disabled { color: #9e9e9e; cursor: default; pointer-events: none; }
      #progress-bar { display: none; margin: 10px 0; }
      .refresh-btn { cursor: pointer; color: #2196F3; transition: transform 0.3s; }
      .refresh-btn:hover { transform: rotate(90deg); }
      .refresh-btn.disabled { color: #9e9e9e; cursor: default; pointer-events: none; }
      .btn-danger { background-color: #ef5350 !important; }
      .btn-warning { background-color: #fb8c00 !important; } /* Orange darken-1 */
      .status-msg { font-size: 12px; padding: 8px; border-radius: 4px; margin-top: 10px; display: none; line-height: 1.4; }
      .status-success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
      .status-error { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
      
      /* Estilos para el modal personalizado */
      #confirm-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
      .modal-content-custom { background: white; padding: 20px; border-radius: 8px; width: 85%; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
      .modal-buttons { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
      
      /* Spinner centralizado para la lista */
      #list-spinner { display: none; justify-content: center; align-items: center; height: 100px; }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="section-title">
        <span>1. Seleccionar hojas</span>
        <i id="btn-refresh" class="material-icons refresh-btn" onclick="cargarHojas()" title="Recargar lista">refresh</i>
      </div>
      
      <div class="selection-controls" id="select-links">
        <a onclick="seleccionarTodo(true)">Todas</a>
        <a onclick="seleccionarVisibles()">Visibles</a>
        <a onclick="seleccionarTodo(false)">Ninguna</a>
      </div>

      <div class="sheet-list">
        <div id="list-spinner">
          <div class="preloader-wrapper small active">
            <div class="spinner-layer spinner-blue-only">
              <div class="circle-clipper left"><div class="circle"></div></div><div class="gap-patch"><div class="circle"></div></div><div class="circle-clipper right"><div class="circle"></div></div>
            </div>
          </div>
        </div>
        <div id="contenedor-hojas"></div>
      </div>

      <div class="progress" id="progress-bar">
          <div class="indeterminate"></div>
      </div>

      <div id="status-box" class="status-msg"></div>

      <div class="section-title" style="margin-top: 15px;">2. Configuración</div>
      
      <div style="margin-top: 8px;">
        <label>
          <input name="modo" type="radio" value="advertencia" checked />
          <span>Modo advertencia</span>
        </label>
      </div>
      <div>
        <label>
          <input name="modo" type="radio" value="soloyo" />
          <span>Solo tú (propietario)</span>
        </label>
      </div>

      <div class="footer center-align">
        <button id="btn-proteger" class="btn waves-effect waves-light blue btn-small" onclick="prepararAccion('proteger')">
          <i class="material-icons left" style="margin-right: 5px;">lock</i>Proteger fórmulas
        </button>
        <button id="btn-desproteger-hdc" class="btn waves-effect waves-light btn-warning btn-small" onclick="prepararAccion('desproteger', true)">
          <i class="material-icons left" style="margin-right: 5px;">lock_open</i>Desproteger (HdC+)
        </button>
        <button id="btn-desproteger-todas" class="btn waves-effect waves-light btn-danger btn-small" onclick="prepararAccion('desproteger', false)">
          <i class="material-icons left" style="margin-right: 5px;">no_encryption</i>Desproteger (Todas)
        </button>
      </div>
    </div>

    <!-- Modal de confirmación personalizado -->
    <div id="confirm-modal">
      <div class="modal-content-custom">
        <h6 id="modal-title" style="font-weight: bold;">Confirmar acción</h6>
        <p id="modal-body" style="font-size: 13px;"></p>
        <div class="modal-buttons">
          <button class="btn-flat waves-effect" id="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
          <button id="btn-confirm-ok" class="btn blue waves-effect waves-light btn-small" style="width: auto;">Aceptar</button>
        </div>
      </div>
    </div>

    <!-- Importar Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      let accionPendiente = null;
      let colaHojas = [];
      let totalIntervalosEfectuados = 0;
      let totalHojasInicial = 0;

      function cargarHojas() {
        showStatus(null);
        document.getElementById('contenedor-hojas').innerHTML = '';
        document.getElementById('list-spinner').style.display = 'flex';
        toggleLoading(true, true);
        
        google.script.run
          .withSuccessHandler(res => {
            renderHojas(res);
            document.getElementById('list-spinner').style.display = 'none';
            toggleLoading(false);
          })
          .withFailureHandler(err => {
            showStatus('Error al cargar hojas: ' + err.message, true);
            document.getElementById('list-spinner').style.display = 'none';
            toggleLoading(false);
          })
          .getHojasParaPanel();
      }

      window.onload = cargarHojas;

      function renderHojas(hojas) {
        const contenedor = document.getElementById('contenedor-hojas');
        contenedor.innerHTML = '';
        
        hojas.forEach(hoja => {
          const div = document.createElement('div');
          div.className = 'sheet-item' + (hoja.oculta ? ' sheet-hidden' : '');
          
          const label = document.createElement('label');
          const input = document.createElement('input');
          input.type = 'checkbox';
          input.className = 'filled-in';
          input.value = hoja.nombre;
          if (hoja.activa) input.checked = true;
          
          const span = document.createElement('span');
          span.textContent = hoja.nombre;
          
          label.appendChild(input);
          label.appendChild(span);
          
          if (hoja.oculta) {
            const icon = document.createElement('i');
            icon.className = 'material-icons tiny';
            icon.textContent = 'visibility_off';
            label.appendChild(icon);
          }
          
          div.appendChild(label);
          contenedor.appendChild(div);
        });
      }

      function seleccionarTodo(estado) {
        const checkboxes = document.querySelectorAll('#contenedor-hojas input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = estado);
      }

      function seleccionarVisibles() {
        const items = document.querySelectorAll('.sheet-item');
        items.forEach(item => {
          const cb = item.querySelector('input');
          cb.checked = !item.classList.contains('sheet-hidden');
        });
      }

      function prepararAccion(accion, soloHdc) {
        const hojasSeleccionadas = [];
        document.querySelectorAll('#contenedor-hojas input:checked').forEach(cb => {
          hojasSeleccionadas.push(cb.value);
        });

        if (hojasSeleccionadas.length === 0) {
          showStatus('⚠️ Selecciona al menos una hoja', true);
          return;
        }

        const modo = document.querySelector('input[name="modo"]:checked').value;
        const msg = accion === 'proteger' ? 'proteger fórmulas' : (soloHdc ? 'eliminar protecciones HdC+' : 'ELIMINAR TODAS las protecciones');
        
        accionPendiente = { accion, soloHdc, hojas: hojasSeleccionadas, modo };
        abrirModal('¿Deseas ' + msg + ' en las ' + hojasSeleccionadas.length + ' hojas seleccionadas?');
      }

      function abrirModal(texto) {
        document.getElementById('modal-body').textContent = texto;
        document.getElementById('confirm-modal').style.display = 'flex';
        document.getElementById('btn-confirm-ok').onclick = function() {
          cerrarModal();
          iniciarProcesamiento();
        };
      }

      function cerrarModal() {
        document.getElementById('confirm-modal').style.display = 'none';
      }

      function iniciarProcesamiento() {
        if (!accionPendiente) return;
        
        colaHojas = [...accionPendiente.hojas];
        totalHojasInicial = colaHojas.length;
        totalIntervalosEfectuados = 0;
        
        toggleLoading(true, false);
        procesarSiguienteHoja();
      }

      function procesarSiguienteHoja() {
        if (colaHojas.length === 0) {
          finalizarProcesamiento();
          return;
        }

        const nombreHoja = colaHojas.shift();
        const numActual = totalHojasInicial - colaHojas.length;
        
        showStatus(`⌛ Procesando pestaña ${numActual}/${totalHojasInicial}: [${nombreHoja}]...`, false);

        google.script.run
          .withSuccessHandler(res => {
            totalIntervalosEfectuados += res.intervalos;
            procesarSiguienteHoja();
          })
          .withFailureHandler(err => {
            showStatus(`❌ Error en pestaña ${nombreHoja}: ` + err.message, true);
            toggleLoading(false);
          })
          .procesarAccionHojaIndividual({
            nombreHoja: nombreHoja,
            accion: accionPendiente.accion,
            modo: accionPendiente.modo,
            soloHdc: accionPendiente.soloHdc
          });
      }

      function finalizarProcesamiento() {
        const msg = `✅ Acción completada. Se han procesado ${totalIntervalosEfectuados} intervalos en ${totalHojasInicial} pestañas.`;
        showStatus(msg, false);
        toggleLoading(false);
        accionPendiente = null;
      }

      function showStatus(msg, isError) {
        const box = document.getElementById('status-box');
        if (!msg) {
          box.style.display = 'none';
          return;
        }
        box.textContent = msg;
        box.className = 'status-msg ' + (isError ? 'status-error' : 'status-success');
        box.style.display = 'block';
      }

      function toggleLoading(loading, isListReload) {
        // Desactivar botones principales
        document.getElementById('btn-proteger').disabled = loading;
        document.getElementById('btn-desproteger-hdc').disabled = loading;
        document.getElementById('btn-desproteger-todas').disabled = loading;
        
        // Desactivar icono de recarga
        const refreshBtn = document.getElementById('btn-refresh');
        if (loading) refreshBtn.classList.add('disabled');
        else refreshBtn.classList.remove('disabled');

        // Desactivar links de selección
        const links = document.querySelectorAll('#select-links a');
        links.forEach(a => {
          if (loading) a.classList.add('disabled');
          else a.classList.remove('disabled');
        });

        // Desactivar todos los inputs (checkboxes y radios)
        const inputs = document.querySelectorAll('input');
        inputs.forEach(i => i.disabled = loading);

        // Mostrar barra de progreso solo para acciones, no para carga de lista
        if (!isListReload) {
          document.getElementById('progress-bar').style.display = loading ? 'block' : 'none';
        }
      }
    </script>
  </body>
</html>
