<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Importar Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Importar Iconos de Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { padding: 15px; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; background-color: #ffffff; }
      .section-title { font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ef5350; display: inline-block; color: #ef5350; padding-bottom: 2px; }
      .radio-group { margin-top: 5px; border: 1px solid #e0e0e0; padding: 10px; border-radius: 4px; background: #fafafa; }
      .radio-group label { display: block; margin-bottom: 8px; color: #424242; }
      .radio-group label:last-child { margin-bottom: 0; }
      .options-group { margin-top: 20px; padding: 10px; border-top: 1px solid #f0f0f0; }
      .options-group label { display: block; margin-bottom: 10px; }
      .footer { margin-top: 25px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
      .btn-small { width: 100%; text-transform: none; display: flex; align-items: center; justify-content: center; height: 36px; }
      #progress-bar { display: none; margin-top: 15px; }
      #ui-freeze-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); z-index: 9999; display: none; cursor: wait; }
      .status-box { font-size: 12px; margin-top: 10px; padding: 8px; border-radius: 4px; display: none; }
      .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
      .warning-text { font-size: 11px; color: #757575; font-style: italic; margin-top: 5px; }
      
      /* Estilos para el modal personalizado */
      .modal-custom { max-width: 350px !important; border-radius: 8px !important; }
      .modal-custom .modal-content { padding: 20px !important; }
      .modal-custom h6 { font-weight: bold; margin-bottom: 15px; }
      .modal-custom p { font-size: 13px; color: #616161; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div id="ui-freeze-overlay"></div>
    
    <div class="section-title">1. Modo de recorte</div>
    
    <div class="radio-group">
      <label>
        <input name="modo" type="radio" value="1" />
        <span>Solo columnas sobrantes</span>
      </label>
      <label>
        <input name="modo" type="radio" value="2" />
        <span>Solo filas sobrantes</span>
      </label>
      <label>
        <input name="modo" type="radio" value="3" checked />
        <span>Filas y columnas sobrantes</span>
      </label>
    </div>

    <div class="section-title" style="margin-top: 25px; border-bottom-color: #2196F3; color: #2196F3;">2. Ajustes avanzados</div>
    
    <div class="options-group">
      <p>
        <label>
          <input type="checkbox" id="encuadre" name="encuadre" class="filled-in" />
          <span><b>Encuadre total</b></span>
        </label>
        <div class="warning-text" style="padding-left: 35px;">Recorta también las filas y columnas vacías por arriba y por la izquierda.</div>
      </p>
      
      <p style="margin-top: 20px;">
        <label>
          <input type="checkbox" id="global" name="global" class="filled-in" />
          <span>Aplicar a todas las pestañas</span>
        </label>
      </p>
    </div>

    <div class="footer center-align">
      <button id="btn-ejecutar" class="btn waves-effect waves-light red lighten-1 btn-small" onclick="prepararAccion()">
        <i class="material-icons left">content_cut</i>Recortar ahora
      </button>
      
      <div class="progress" id="progress-bar">
        <div class="indeterminate"></div>
      </div>
      
      <div id="status-box" class="status-box"></div>
    </div>

    <!-- Modal de confirmación personalizado -->
    <div id="modal-confirm" class="modal modal-custom">
      <div class="modal-content">
        <h6 id="confirm-title">Confirmar acción</h6>
        <p id="confirm-body"></p>
      </div>
      <div class="modal-footer">
        <button class="modal-close btn-flat">Cancelar</button>
        <button id="btn-confirm-ok" class="btn red lighten-1 white-text btn-small" style="width: auto;">Aceptar</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        M.AutoInit();
      });

      function prepararAccion() {
        const global = document.getElementById('global').checked;
        const msg = global 
          ? '¿Estás seguro de recortar TODAS las pestañas del documento? Esta acción eliminará las filas y columnas vacías de forma inmediata.' 
          : '¿Deseas recortar la pestaña actual? Se eliminarán todas las filas y columnas sobrantes.';
        
        abrirConfirmacion('Confirmar recorte', msg, ejecutar);
      }

      function abrirConfirmacion(titulo, mensaje, callback) {
        document.getElementById('confirm-title').textContent = titulo;
        document.getElementById('confirm-body').textContent = mensaje;
        const btnOk = document.getElementById('btn-confirm-ok');
        const inst = M.Modal.getInstance(document.getElementById('modal-confirm'));
        
        btnOk.onclick = function() {
          inst.close();
          callback();
        };
        inst.open();
      }

      function ejecutar() {
        const modo = document.querySelector('input[name="modo"]:checked').value;
        const global = document.getElementById('global').checked ? 'on' : 'off';
        const encuadre = document.getElementById('encuadre').checked ? 'on' : 'off';
        
        toggleLoading(true);
        showStatus(null);

        google.script.run
          .withSuccessHandler(res => {
            M.toast({html: res});
            showStatus(res);
            toggleLoading(false);
          })
          .withFailureHandler(err => {
            M.toast({html: '❌ Error: ' + err.message});
            toggleLoading(false);
          })
          .eliminarFyC_core({
            modo: modo,
            global: global,
            encuadre: encuadre
          });
      }

      function toggleLoading(val) {
        document.getElementById('btn-ejecutar').disabled = val;
        document.getElementById('progress-bar').style.display = val ? 'block' : 'none';
        document.getElementById('ui-freeze-overlay').style.display = val ? 'block' : 'none';
      }

      function showStatus(msg) {
        const box = document.getElementById('status-box');
        if (!msg) {
          box.style.display = 'none';
          return;
        }
        box.textContent = msg;
        box.className = 'status-box status-success';
        box.style.display = 'block';
      }
    </script>
  </body>
</html>
