<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Importar Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Importar Iconos de Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { padding: 15px; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; background-color: #ffffff; }
      .section-title { font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #2196F3; display: inline-block; color: #2196F3; padding-bottom: 2px; }
      .input-row { margin-bottom: 15px; display: flex; gap: 15px; }
      .input-field { margin-top: 0 !important; margin-bottom: 0 !important; flex: 1; }
      .radio-group { margin-top: 15px; border: 1px solid #e0e0e0; padding: 10px; border-radius: 4px; background: #fafafa; }
      .radio-group label { display: block; margin-bottom: 8px; color: #424242; }
      .radio-group label:last-child { margin-bottom: 0; }
      .footer { margin-top: 25px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
      .btn-small { width: 100%; text-transform: none; display: flex; align-items: center; justify-content: center; height: 36px; }
      #progress-bar { display: none; margin-top: 15px; }
      #ui-freeze-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); z-index: 9999; display: none; cursor: wait; }
      .status-box { font-size: 12px; margin-top: 10px; padding: 8px; border-radius: 4px; display: none; }
      .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    </style>
  </head>
  <body>
    <div id="ui-freeze-overlay"></div>
    
    <div class="section-title">1. Dimensiones</div>
    
    <div class="input-row">
      <div class="input-field">
        <input type="number" id="numFil" value="0" min="0">
        <label class="active" for="numFil">Nº de filas</label>
      </div>
      <div class="input-field">
        <input type="number" id="numCol" value="0" min="0">
        <label class="active" for="numCol">Nº de columnas</label>
      </div>
    </div>

    <div class="section-title" style="margin-top: 20px;">2. Posición</div>
    
    <div class="radio-group">
      <label>
        <input name="modo" type="radio" value="1" />
        <span>Al inicio de la hoja</span>
      </label>
      <label>
        <input name="modo" type="radio" value="2" />
        <span>Al final de la hoja</span>
      </label>
      <label>
        <input name="modo" type="radio" value="3" />
        <span>Antes de la celda activa</span>
      </label>
      <label>
        <input name="modo" type="radio" value="4" checked />
        <span>Después de la celda activa</span>
      </label>
    </div>

    <div class="footer center-align">
      <button id="btn-ejecutar" class="btn waves-effect waves-light blue btn-small" onclick="ejecutar()">
        <i class="material-icons left">add_box</i>Insertar ahora
      </button>
      
      <div class="progress" id="progress-bar">
        <div class="indeterminate"></div>
      </div>
      
      <div id="status-box" class="status-box"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      function ejecutar() {
        const numFil = document.getElementById('numFil').value;
        const numCol = document.getElementById('numCol').value;
        
        if (numFil == 0 && numCol == 0) {
          M.toast({html: '⚠️ Indica al menos una fila o columna'});
          return;
        }

        const modo = document.querySelector('input[name="modo"]:checked').value;
        
        toggleLoading(true);
        showStatus(null);

        google.script.run
          .withSuccessHandler(res => {
            M.toast({html: res});
            showStatus(res);
            toggleLoading(false);
          })
          .withFailureHandler(err => {
            M.toast({html: '❌ Error: ' + err.message});
            toggleLoading(false);
          })
          .insertarFyC_core({
            numFil: numFil,
            numCol: numCol,
            modo: modo
          });
      }

      function toggleLoading(val) {
        document.getElementById('btn-ejecutar').disabled = val;
        document.getElementById('progress-bar').style.display = val ? 'block' : 'none';
        document.getElementById('ui-freeze-overlay').style.display = val ? 'block' : 'none';
      }

      function showStatus(msg) {
        const box = document.getElementById('status-box');
        if (!msg) {
          box.style.display = 'none';
          return;
        }
        box.textContent = msg;
        box.className = 'status-box status-success';
        box.style.display = 'block';
      }
    </script>
  </body>
</html>
