<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Importar Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Importar Iconos de Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { padding: 15px; font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; background-color: #ffffff; }
      .section-title { font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #2196F3; display: inline-block; color: #2196F3; padding-bottom: 2px; }
      .input-field { margin-top: 10px !important; margin-bottom: 30px !important; }
      .input-field input, .input-field textarea { margin-bottom: 8px !important; }
      .helper-text { font-size: 11px; color: #757575; margin-bottom: 15px; display: block; padding-top: 5px; font-style: italic; }
      .footer { margin-top: 30px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
      .btn-small { width: 100%; text-transform: none; display: flex; align-items: center; justify-content: center; height: 36px; margin-bottom: 10px; }
      .btn-ref { width: auto; font-size: 11px; height: 28px; line-height: 28px; padding: 0 10px; margin-bottom: 0px; }
      #progress-bar { display: none; margin-top: 15px; }
      #ui-freeze-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.1); z-index: 9999; display: none; cursor: wait; }
      .status-box { font-size: 12px; margin-top: 10px; padding: 8px; border-radius: 4px; display: none; line-height: 1.4; }
      .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
      
      /* Micro spinners */
      .mini-spinner { display: none; width: 16px; height: 16px; border: 2px solid #ccc; border-top: 2px solid #2196F3; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .btn-container { display: flex; align-items: center; }

      /* Ajuste específico para el textarea */
      #encabezados { min-height: 80px; }
      .textarea-wrapper { position: relative; }
      .clear-textarea { position: absolute; right: 0; top: 0; cursor: pointer; color: #9e9e9e; font-size: 18px; padding: 5px; }
      .clear-textarea:hover { color: #ef5350; }
      
      /* Toasts personalizados */
      .toast { border-radius: 25px !important; min-height: 40px !important; justify-content: center !important; text-align: center !important; }
    </style>
  </head>
  <body>
    <div id="ui-freeze-overlay"></div>
    
    <form id="formConsolidar">
      <div class="section-title">1. Origen y destino</div>
      
      <div class="input-field">
        <input placeholder="Selecciona rango y clic en botón" id="rango" name="rango" type="text" class="validate">
        <label class="active" for="rango">Rango a consolidar (con encabezados)</label>
        <div class="btn-container">
          <button type="button" id="btn-rango" onclick="leerReferencia('rango')" class="btn-small btn-ref waves-effect waves-light grey darken-1">
            <i class="material-icons left tiny">grid_on</i>Usar selección
          </button>
          <div id="spinner-rango" class="mini-spinner"></div>
        </div>
        <div class="helper-text red-text text-darken-1" style="margin-top: 5px; font-weight: 500; font-style: normal;">
          ⚠️ La primera fila seleccionada DEBE ser la de encabezados.
        </div>
      </div>
      
      <div class="input-field">
        <input placeholder="Selecciona celda y clic en botón" id="destino" name="destino" type="text" class="validate">
        <label class="active" for="destino">Celda destino</label>
        <div class="btn-container">
          <button type="button" id="btn-celda" onclick="leerReferencia('celda')" class="btn-small btn-ref waves-effect waves-light grey darken-1">
            <i class="material-icons left tiny">near_me</i>Usar celda activa
          </button>
          <div id="spinner-celda" class="mini-spinner"></div>
        </div>
      </div>

      <div class="section-title" style="margin-top: 5px;">2. Estructura</div>
      
      <div class="input-field">
        <input type="number" name="numCol" value="1" min="1" step="1" id="numCol" class="validate">
        <label class="active" for="numCol">Nº columnas fijas a la izquierda</label>
        <div class="helper-text">Columnas que no se pivotarán.</div>
      </div>
      
      <div class="input-field textarea-wrapper" style="margin-top: 20px !important;">
        <i class="material-icons clear-textarea" title="Limpiar etiquetas" onclick="limpiarEncabezados()">close</i>
        <textarea id="encabezados" name="encabezados" class="materialize-textarea" placeholder="Etiqueta 1&#10;Etiqueta 2&#10;Etiqueta 3..."></textarea>
        <label class="active" for="encabezados">Nuevos encabezados (uno por línea)</label>
        <div class="helper-text">Opcional. Si se omite, se usarán los originales.</div>
      </div>
    </form>

    <div class="footer center-align">
      <button id="btn-ejecutar" class="btn waves-effect waves-light blue btn-small" onclick="ejecutar()">
        <i class="material-icons left">table_chart</i>Consolidar ahora
      </button>
      
      <div class="progress" id="progress-bar">
        <div class="indeterminate"></div>
      </div>
      
      <div id="status-box" class="status-box"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        M.AutoInit();
        M.textareaAutoResize(document.getElementById('encabezados'));
        
        // Carga inicial de rango si hay algo seleccionado
        leerReferencia('rango');
      });

      function limpiarEncabezados() {
        const txt = document.getElementById('encabezados');
        txt.value = '';
        M.textareaAutoResize(txt);
        M.updateTextFields();
      }

      function leerReferencia(modo) {
        const spinner = document.getElementById('spinner-' + modo);
        const btn = document.getElementById('btn-' + modo);
        
        spinner.style.display = 'inline-block';
        btn.disabled = true;

        google.script.run
          .withSuccessHandler(valor => {
            spinner.style.display = 'none';
            btn.disabled = false;
            if (valor.startsWith('¡')) {
              M.toast({html: valor});
            } else {
              const id = (modo === 'rango') ? 'rango' : 'destino';
              const input = document.getElementById(id);
              input.value = valor;
              M.updateTextFields();
            }
          })
          .withFailureHandler(err => {
            spinner.style.display = 'none';
            btn.disabled = false;
            M.toast({html: '❌ Error: ' + err.message});
          })
          .unpivot_capturarRango(modo);
      }

      function ejecutar() {
        const form = document.getElementById('formConsolidar');
        const rango = document.getElementById('rango').value;
        const destino = document.getElementById('destino').value;
        const numCol = document.getElementById('numCol').value;

        if (!rango || !destino || numCol < 1) {
          M.toast({html: '⚠️ Completa todos los campos obligatorios'});
          return;
        }

        toggleLoading(true);
        showStatus(null);

        // Obtener datos del formulario de forma nativa
        const formData = {
          rango: rango,
          destino: destino,
          numCol: numCol,
          encabezados: document.getElementById('encabezados').value
        };

        google.script.run
          .withSuccessHandler(() => {
            showStatus('✅ Operación completada con éxito.');
            toggleLoading(false);
          })
          .withFailureHandler(err => {
            M.toast({html: '❌ Error: ' + err.message});
            toggleLoading(false);
          })
          .unpivot_core(formData);
      }

      function toggleLoading(val) {
        document.getElementById('btn-ejecutar').disabled = val;
        document.getElementById('progress-bar').style.display = val ? 'block' : 'none';
        document.getElementById('ui-freeze-overlay').style.display = val ? 'block' : 'none';
      }

      function showStatus(msg) {
        const box = document.getElementById('status-box');
        if (!msg) {
          box.style.display = 'none';
          return;
        }
        box.textContent = msg;
        box.className = 'status-box status-success';
        box.style.display = 'block';
      }
    </script>
  </body>
</html>
